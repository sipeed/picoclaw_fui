name: picoclaw_flutter_ui
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.3

dependencies:
  animations: 2.1.2
  bitsdojo_window: ^0.1.6
  desktop_webview_window: ^0.2.3
  file_picker: ^10.3.10
  flex_color_scheme: any
  flutter:
    sdk: flutter
  firebase_analytics: ^11.3.6
  firebase_core: ^3.8.0
  flutter_background_service: ^5.1.0
  flutter_local_notifications: ^21.0.0
  flutter_localizations:
    sdk: flutter
  google_fonts: any
  intl: any
  local_session_timeout: any
  path_provider: ^2.1.5
  process_run: ^1.3.1+1
  path: any
  package_info_plus: ^9.0.1
  provider: ^6.1.5+1
  qr_flutter: ^4.1.0
  remixicon: ^4.9.2
  shared_preferences: ^2.5.5
  tray_manager: ^0.5.2
  url_launcher: ^6.3.2
  uuid: ^4.5.1
  web_socket_channel: ^3.0.2
  webview_flutter: ^4.13.1
  webview_windows: ^0.4.0
  window_manager: ^0.5.1
  windows_single_instance: any
  http: ^1.1.0
  archive: ^4.0.9
  args: ^2.4.2
  share_plus: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  windows:
    generate: true
    image_path: "assets/app_icon.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "assets/app_icon.png"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/app_icon.png
    - assets/icon.ico

flutter_intl:
  enabled: true
